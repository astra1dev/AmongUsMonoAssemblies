name: Build & Publish HTML Diffs to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install ilspycmd
        run: |
          dotnet tool install --global ilspycmd
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Verify ilspycmd
        run: ilspycmd --version

      - name: Install diffoscope
        run: |
          pip install diffoscope

      - name: Verify diffoscope
        run: |
          diffoscope --version
          diffoscope --list-tools

      - name: Run decompiler
        run: |
          ./decompile_all.sh

      - name: Run generator
        run: |
          ./generate_diffs.sh

      - name: Prepare publish directory
        run: |
          PUBLISH_DIR=publish
          mkdir -p "$PUBLISH_DIR"
          # copy generated HTML files from repo root into publish dir
          shopt -s nullglob
          for f in ./*.html; do
            name=$(basename "$f")
            # skip any repo-root index.html if present (we'll create our own)
            [ "$name" = "index.html" ] && continue
            cp "$f" "$PUBLISH_DIR/$name"
          done

      - name: Create index.html
        run: |
          PUBLISH_DIR=publish

          # count DLLs in repo root
          shopt -s nullglob
          files=(./*.dll)
          dll_count=${#files[@]}
          diffs=$(( dll_count > 0 ? dll_count - 1 : 0 ))

          cat > "$PUBLISH_DIR/index.html" <<HTML
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8"/>
              <title>Among Us Mono Assemblies</title>
            </head>
            <body>
              <h1>Among Us Mono Assemblies</h1>
              <a href="https://github.com/astra1dev/AmongUsMonoAssemblies">GitHub Repository</a><br>
              <h2>Diffs</h2>
              <p>
                Current assemblies: ${dll_count}<br>
                Current diffs: ${diffs}<br>
              </p>
              <p>
                Powered by <a href="https://github.com/icsharpcode/ILSpy/tree/master/ICSharpCode.ILSpyCmd">ILSpyCmd</a> and <a href="https://diffoscope.org">Diffoscope</a>
              </p>
              <br>
              <table>
                <tr>
                  <th>Link</th>
                  <th>File Size</th>
                </tr>
          HTML

          # List other HTML files in publish dir (skip index.html)
          shopt -s nullglob
          for f in "$PUBLISH_DIR"/*.html; do
            name=$(basename "$f")
            [ "$name" = "index.html" ] && continue
            bytes=$(stat -c%s "$f")
            hr_size=$(numfmt --to=iec --format="%.1f" "$bytes")
            echo "      <tr>" >> "$PUBLISH_DIR/index.html"
            echo "        <td><a href=\"$name\">$name</a></td>" >> "$PUBLISH_DIR/index.html"
            echo "        <td>$hr_size</td>" >> "$PUBLISH_DIR/index.html"
            echo "      </tr>" >> "$PUBLISH_DIR/index.html"
          done

          cat >> "$PUBLISH_DIR/index.html" <<'HTML'
              </table>
            </body>
          </html>
          <style>

          table, th, td {
            border: 1px solid;
          }

          th, td {
            padding: 8px;
          }

          table {
            border-spacing: 2px;
          }

          /* "Animation" when hovering over links */
          a {
            text-decoration: none;
          }

          a:hover {
            text-decoration: underline;
          }

          /* Dark mode styles */
          @media (prefers-color-scheme: dark) {
            body {
              background-color: #121212;
              color: #e0e0e0;
            }

            a {
              color: #3498DB;
            }
          }

          </style>
          HTML

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: publish

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
